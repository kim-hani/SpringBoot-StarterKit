# 로컬 개발 환경 — H2 인메모리 DB 사용 (별도 DB 설치 불필요)
spring:
  datasource:
    url: jdbc:h2:mem:starterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true             # http://localhost:8080/h2-console 접근 가능
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop     # 로컬에서는 매 실행마다 스키마 재생성

  # 🌟 아래 security 블록을 상단 spring: 밑으로 합쳤습니다 (들여쓰기 공백 2칸 일치)
  security:
    oauth2:
      client:
        registration:
          # ── Google ──────────────────────────────
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email

          # ── Naver ───────────────────────────────
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: name, email, profile_image
            client-name: Naver

          # ── Kakao ───────────────────────────────
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname, profile_image, account_email
            client-name: Kakao

        provider:
          # Naver는 Spring 기본 provider 목록에 없으므로 직접 등록
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response   # 응답 최상위 키

          # Kakao는 Spring 기본 provider 목록에 없으므로 직접 등록
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id         # 응답 최상위 식별자

logging:
  level:
    org.hibernate.SQL: DEBUG    # 로컬에서 SQL 쿼리 로그 출력
    org.hibernate.orm.jdbc.bind: TRACE  # 바인딩 파라미터 출력

# 로컬 환경에서만 Swagger UI 활성화
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
    operations-sorter: alpha    # API 목록을 알파벳 순으로 정렬
    tags-sorter: alpha          # 태그를 알파벳 순으로 정렬
    try-it-out-enabled: true    # Try it out 버튼 기본 활성화

