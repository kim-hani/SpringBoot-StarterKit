# PostgreSQL 환경 설정 — 실제 값은 환경 변수로 주입 (절대 코드에 직접 입력 금지)
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/starterdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none            # 운영에서는 Flyway/Liquibase로 스키마 관리 권장
